name: Launch worker

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      seed_history:
        description: "Einmaligen Backfill aus Launch Library /launch/previous/ ausfuehren"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: launch-worker
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run launch worker
        env:
          SEED_HISTORY: ${{ github.event_name == 'workflow_dispatch' && inputs.seed_history || 'false' }}
          STATS_TIMEZONE: Europe/Berlin
          MAX_DETAIL_CHECKS: "8"
        run: python scripts/launch_worker.py

      - name: Commit updated data
        run: |
          if [ -z "$(git status --porcelain data)" ]; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update launch worker data"
          git push
